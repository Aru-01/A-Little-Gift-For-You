<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>A Little Gift For You 🌸</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Dancing+Script:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

    <canvas id="stars"></canvas>
    <div id="bokeh"></div>
    <div id="brighten"></div>
    <canvas id="particles"></canvas>
    <div id="petalsLayer"></div>
    <div id="cursor"></div>

    <button id="music-toggle" aria-label="Toggle music">🔈</button>

    <section id="s1" class="scene active">
        <p id="hint" class="font-d t-faint" style="font-size:1.55rem; letter-spacing:.05em;">Touch anywhere...</p>

        <div id="f1-pos" style="opacity:0; position:relative;">
            <div id="f1-glow" style="position:absolute; inset:-18% -18% -2% -18%; border-radius:50%;
         background:radial-gradient(circle at 50% 42%, rgba(245,182,200,0.5) 0%, rgba(183,133,224,0.22) 45%, transparent 70%);
         animation:glowPulse 4s ease-in-out infinite;"></div>
            <div id="f1-scale">
                <div class="fl-float">
                    <div class="fl-breathe">
                        <svg id="f1-svg" class="fl-svg" viewBox="-120 -130 240 300" width="220" height="275"
                            style="max-width:74vw;">
                            <defs>
                                <radialGradient id="petalA" cx="50%" cy="22%" r="78%">
                                    <stop offset="0%" stop-color="#fff2f6" />
                                    <stop offset="42%" stop-color="#f7c1d4" />
                                    <stop offset="100%" stop-color="#e07ba0" />
                                </radialGradient>
                                <radialGradient id="petalB" cx="50%" cy="22%" r="78%">
                                    <stop offset="0%" stop-color="#fdeafb" />
                                    <stop offset="45%" stop-color="#e9b7f0" />
                                    <stop offset="100%" stop-color="#c07fda" />
                                </radialGradient>
                                <radialGradient id="goldA" cx="42%" cy="38%" r="70%">
                                    <stop offset="0%" stop-color="#fff7cf" />
                                    <stop offset="55%" stop-color="#f3cf76" />
                                    <stop offset="100%" stop-color="#dd9e34" />
                                </radialGradient>
                                <linearGradient id="stemA" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="#9fd29a" />
                                    <stop offset="100%" stop-color="#6fae74" />
                                </linearGradient>
                                <radialGradient id="leafA" cx="40%" cy="30%" r="80%">
                                    <stop offset="0%" stop-color="#bfe3b6" />
                                    <stop offset="100%" stop-color="#7cb87f" />
                                </radialGradient>
                            </defs>
                            <g id="f1-stem" opacity="0">
                                <path d="M2,0 C 10,55 -8,110 4,178" fill="none" stroke="url(#stemA)" stroke-width="5"
                                    stroke-linecap="round" />
                                <path d="M4,70 C -40,58 -58,86 -30,110 C -8,96 6,86 4,70 Z" fill="url(#leafA)" />
                                <path d="M3,108 C 44,98 64,126 34,150 C 12,134 2,124 3,108 Z" fill="url(#leafA)" />
                            </g>
                            <g id="f1-outer"></g>
                            <g id="f1-inner"></g>
                            <g id="f1-center" opacity="0">
                                <circle r="26" fill="url(#goldA)" opacity="0.35" />
                                <circle r="16" fill="url(#goldA)" />
                                <circle cx="-5" cy="-6" r="5" fill="rgba(255,255,255,0.55)" />
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div id="s1-msg" class="text-center mt-7" style="opacity:0; transform:translateY(20px);">
            <p class="font-d t-dream" style="font-size:2.1rem; line-height:1.2;">Welcome, Miss 🌸</p>
            <div id="s1-type" style="margin-top:.75rem; min-height:3.4em; line-height:1.7; font-size:1.25rem;"></div>
            <div id="s1-btnwrap" style="margin-top:1.25rem; opacity:0; transform:scale(.85);">
                <button id="btn-start" class="btn-glow">✨ Get Started</button>
            </div>
        </div>
    </section>

    <section id="s2" class="scene">
        <div class="text-center" style="max-width:20rem; margin:0 auto;">
            <div id="t2" style="font-size:1.7rem; line-height:1.6; min-height:9rem;"></div>
        </div>
    </section>

    <section id="s3" class="scene">
        <div class="text-center" style="max-width:20rem; margin:0 auto;">
            <div id="t3" style="font-size:1.55rem; line-height:1.58; min-height:13rem;"></div>
        </div>
    </section>

    <section id="s4" class="scene">
        <div class="text-center" style="max-width:22rem; margin:0 auto;">
            <div id="t4" style="font-size:1.45rem; line-height:1.58; min-height:14rem;"></div>
        </div>
    </section>

    <section id="s5" class="scene" style="gap:1.2rem;">
        <div id="f5-pos" style="opacity:0; position:relative; flex-shrink:0;">
            <div id="f5-glow" style="position:absolute; inset:-26%; border-radius:50%;
         background:radial-gradient(circle, rgba(245,182,200,0.55) 0%, rgba(183,133,224,0.25) 48%, transparent 72%);
         animation:glowPulse 3.4s ease-in-out infinite;"></div>
            <div id="f5-scale">
                <div class="fl-float" style="animation-duration:7s;">
                    <div class="fl-breathe" style="animation-duration:5s;">
                        <svg id="f5-svg" class="fl-svg" viewBox="-120 -120 240 240" width="240" height="240"
                            style="max-width:54vw;">
                            <g id="f5-outer"></g>
                            <g id="f5-mid"></g>
                            <g id="f5-inner"></g>
                            <g>
                                <circle r="30" fill="url(#goldA)" opacity="0.3" />
                                <circle r="19" fill="url(#goldA)" />
                                <circle cx="-6" cy="-7" r="6" fill="rgba(255,255,255,0.5)" />
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center" style="max-width:20rem; margin:0 auto;">
            <div id="t5" style="font-size:1.4rem; line-height:1.56; min-height:11rem;"></div>
        </div>
    </section>

    <section id="sf" class="scene">
        <div
            style="display:flex; flex-direction:column; align-items:center; width:100%; max-width:24rem; margin:0 auto;">

            <div id="tree-pos" style="opacity:0; position:relative; flex-shrink:0;">
                <div style="position:absolute; inset:-30%; border-radius:50%;
           background:radial-gradient(circle, rgba(245,182,200,0.4) 0%, rgba(183,133,224,0.2) 50%, transparent 72%);
           animation:glowPulse 4s ease-in-out infinite;"></div>
                <svg class="fl-svg fl-float" viewBox="-110 -120 220 230" width="150" height="157"
                    style="max-width:42vw;">
                    <defs>
                        <linearGradient id="trunk" x1="0" y1="1" x2="0" y2="0">
                            <stop offset="0%" stop-color="#5a3d4a" />
                            <stop offset="100%" stop-color="#7a5360" />
                        </linearGradient>
                    </defs>
                    <path d="M-6,100 C -10,40 -4,10 0,-6 C 4,10 10,40 6,100 Z" fill="url(#trunk)" />
                    <path d="M0,10 C -34,-6 -54,-30 -62,-58" fill="none" stroke="url(#trunk)" stroke-width="5"
                        stroke-linecap="round" />
                    <path d="M0,2 C 30,-14 52,-34 60,-64" fill="none" stroke="url(#trunk)" stroke-width="5"
                        stroke-linecap="round" />
                    <path d="M0,-2 C -8,-40 -4,-66 2,-90" fill="none" stroke="url(#trunk)" stroke-width="5"
                        stroke-linecap="round" />
                    <g id="tree-blossoms"></g>
                </svg>
            </div>

            <div id="letter" class="text-center"
                style="margin-top:1rem; padding:0 .5rem; font-size:1.16rem; line-height:1.66;"></div>

            <div id="sign" class="font-p t-faint text-center"
                style="margin-top:1rem; opacity:0; font-size:.74rem; letter-spacing:.1em; font-style:italic; line-height:1.6;">
                — With all the kindness<br>my heart could hold.
            </div>

            <div id="mem-wrap" style="margin-top:1.6rem; margin-bottom:3rem; opacity:0; transform:scale(.85);">
                <button id="btn-mem" class="btn-glow">❤️ Keep This Memory</button>
            </div>
        </div>
    </section>

    <div id="blurLayer"></div>
    <div id="blackout"></div>
    <div id="finalMsg">
        <div id="finalMsg-text" style="font-size:2rem; line-height:1.5;"></div>
    </div>
    <div id="remainFlower">
        <div style="position:relative;">
            <div style="position:absolute; inset:-60%; border-radius:50%;
         background:radial-gradient(circle, rgba(245,182,200,0.45) 0%, rgba(183,133,224,0.2) 50%, transparent 72%);
         animation:glowPulse 4s ease-in-out infinite;"></div>
            <div class="fl-float" style="font-size:4.4rem; filter:drop-shadow(0 0 22px rgba(245,182,200,0.85));">🌸
            </div>
        </div>
    </div>

    <script src="./js/animations.js"></script>
    <script src="./js/sceneManager.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
